<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cellular conquest</title>
    <link rel="stylesheet" href="./gameStyles/gameStyles.css" />
    <link rel="stylesheet" href="./gameStyles/gameMobile.css" />
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div id="gameInfo" class="allScreen">
      <div class="row">
        <div id="playerInfo" class="styledDiv">
          <h5 id="playerName">Nickname</h5>
          <div id="playerScore">Score: 0</div>
          <div id="speedBarContainer">
            <div id="speedBarLabel">Speed Points:</div>
            <div id="speedBarBackground">
              <div id="speedBarFill"></div>
            </div>
          </div>
          <div id="roomId" class="copyable" title="Click to copy room ID">
            <span>Copy Room ID:</span
            ><svg
              width="16"
              height="16"
              viewBox="0 0 23 23"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M17 17H19.5C20.6046 17 21.5 16.1046 21.5 15V3C21.5 1.89543 20.6046 1 19.5 1H7.5C6.39543 1 5.5 1.89543 5.5 3V6M3 22H15C16.1046 22 17 21.1046 17 20V8C17 6.89543 16.1046 6 15 6H3C1.89543 6 1 6.89543 1 8V20C1 21.1046 1.89543 22 3 22Z"
                stroke="#d5ffe9"
                stroke-width="2"
              />
            </svg>
          </div>
        </div>
        <div id="leaderboard" class="styledDiv">
          <h3>Leaderboard</h3>
          <ol id="leaderboardList"></ol>
        </div>
      </div>
      <div class="row">
        <div id="mobileControls" class="allScreen hidden">
          <div id="joystickContainer">
            <div id="joystickBase"></div>
            <div id="joystickHandle"></div>
          </div>

          <div id="actionButtons">
            <button id="speedupBtn" class="actionBtn">Speed up</button>
            <button id="splitBtn" class="actionBtn">Split</button>
            <button id="feedBtn" class="actionBtn">Feed</button>
          </div>
        </div>
      </div>
    </div>
    <div id="copyPopup" class="styledDiv popupNotice copy">
      Copied to clipboard successfully!
    </div>
    <div id="errorPopup" class="styledDiv popupNotice error">
      Something went wrong
    </div>

    <div id="exitPopup" class="allScreen hidden fadeIn">
      <div class="blur allScreen"></div>
      <div class="popupContent styledDiv">
        <h2>Exit Game?</h2>
        <p>Are you sure you want to return to the main menu?</p>
        <div class="exitButtons">
          <button id="cancelExit" class="btn">Cancel</button>
          <button id="confirmExit" class="btn">Exit Game</button>
        </div>
      </div>
    </div>
    <div id="deathPopup" class="allScreen hidden">
      <div class="blur allScreen"></div>
      <div class="popupContent styledDiv fadeIn">
        <h2>Game Over</h2>
        <p>Your final score: <span id="finalScore">0</span></p>
        <p id="autoCloseNotice" class="hidden">
          Returning to main menu in <span id="countdown">10</span>s...
        </p>
        <div class="exitButtons">
          <button id="restartGame" onclick="location.reload()" class="btn">
            Play Again
          </button>
          <button
            id="returnMenu"
            onclick="location.href = 'web.html'"
            class="btn"
          >
            Main Menu
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="./gameMain.js"></script>
  </body>
</html>
