<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cellular Conquest</title>
  <link rel="stylesheet" href="webdesign.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="roomCodeModal" class="modal" style="display: none;">
    <div class="modal-content">
      <span class="close" id="closeModal">&times;</span>
      <h2>Join Teams Room</h2>
      <div class="room-actions">
        <div class="action-group">
          <h3>Create New Room</h3>
          <button id="createRoomBtn">Create Room</button>
        </div>
        <div class="divider">OR</div>
        <div class="action-group">
          <h3>Join Existing Room</h3>
          <input type="text" id="roomCodeInput" placeholder="Enter room code" />
          <button id="joinRoomBtn">Join Room</button>
        </div>
      </div>
      <div id="createdRoomInfo" style="display: none;">
        <h3>Room Created!</h3>
        <p>Share this code with your friends:</p>
        <div class="room-code-display">
          <span id="displayRoomCode"></span>
          <button id="copyCodeBtn">Copy</button>
        </div>
        <button id="startGameBtn">Start Game</button>
      </div>
    </div>
  </div>

  <div id="skinModal" class="modal" style="display:none;">
    <div class="modal-content">
      <span id="closeSkinModal" class="close">&times;</span>
      <h2>Choose your skin</h2>
      <div id="skinsList"></div>
      <div style="text-align: center; margin-bottom: 10px;">
        <button id="resetSkinBtn">Reset to Default Green</button>
      </div>
      <input type="file" id="customSkinInput" accept="image/*" style="margin-bottom:8px;">
      <button id="addCustomSkinBtn">Add Custom Skin</button>
    </div>
  </div>

  <div class="wrapper">
    <div class="header">
      <h1>Cellular Conquest</h1>
      <h2>Grow. Survive. Conquer.</h2>
    </div>
    
    <div class="main-content">
      <div class="panel play-panel main-panel">
        <div class="title">Play</div>
        <div class="modes">
          <button class="mode-btn active" data-mode="ffa">FFA</button>
          <button class="mode-btn" data-mode="teams">Teams</button>
          <button class="mode-btn" data-mode="deathmatch">Death Match</button>
          <button class="mode-btn" data-mode="other">Other</button>
        </div>
      </div>
      
      <div class="side-panels">
        <div class="panel profile-panel">
          <div class="profile-header">
            <button id="skinsBtn" class="skins-btn"> Skins</button>
          </div>
          <div class="avatar"></div>
          <input type="text" id="nicknameInput" class="nick-input" placeholder="Nickname" />
          <div class="level">Level 0</div>
        </div>
        
        <div class="panel stats-panel">
          <div class="title"> Stats</div>
          <div class="stat-item">
            <span class="stat-label">Last score:</span>
            <span id="lastScore" class="stat-value">835</span>
          </div>
          <div class="stat-item">
            <span class="stat-label">Best score:</span>
            <span id="bestScore" class="stat-value">24 543</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="actions-panel">
      <button id="settingsBtn" class="action-btn secondary"> Settings</button>
      <button id="logoutBtn" class="action-btn danger"> Exit / Log Out</button>
    </div>
  </div>

  <script type="module" src="webMain.js"></script>
</body>
</html>
